<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Embalagens</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>Controle de Embalagens</h1>
  </header>

  <main>

    <button id="btnGerenciar" class="btnGerenciar">Gerenciar Embalagens</button>

    <section class="form">
      <label>Data</label>
      <input type="date" id="data">

      <label>Categoria</label>
      <select id="categoria"></select>

      <label>Embalagem</label>
      <select id="embalagem"></select>

      <label>Estoque Atual</label>
      <input type="number" id="estoqueAtual">

      <button id="addItemBtn">Adicionar Item</button>
    </section>

    <section class="tabela">
      <h2>Itens do Pedido</h2>
      <table id="tabelaItens">
        <thead>
          <tr>
            <th>Data</th>
            <th>Categoria</th>
            <th>Código</th>
            <th>Descrição</th>
            <th>Capacidade</th>
            <th>Estoque Atual</th>
            <th>Pedir</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <button id="gerarPlanilhaBtn">Gerar Planilha</button>
      <button id="limparBtn">Limpar Pedido</button>
    </section>

    <section class="gerenciar">
      <h2>Gerenciar Embalagens</h2>

      <button id="btnRecolher" class="btnGerenciar" style="background:#d32f2f;">
        Recolher
      </button>

      <div class="tabs">
        <button class="tab-btn active" data-tab="tab-adicionar">Adicionar</button>
        <button class="tab-btn" data-tab="tab-editar">Editar / Remover</button>
      </div>

      <div id="tab-adicionar" class="tab-content active">
        <div class="form-gerenciar">
          <h3>Adicionar nova embalagem</h3>

          <label>Categoria</label>
          <input id="novaCategoria" type="text">

          <label>Código</label>
          <input id="novoCodigo" type="text">

          <label>Nome</label>
          <input id="novoNome" type="text">

          <label>Capacidade</label>
          <input id="novaCapacidade" type="number">

          <button id="btnAdicionar">Adicionar Embalagem</button>
        </div>
      </div>

      <div id="tab-editar" class="tab-content">
        <h3>Lista de embalagens</h3>
        <table id="tabelaGerenciar">
          <thead>
            <tr>
              <th>Categoria</th>
              <th>Código</th>
              <th>Nome</th>
              <th>Capacidade</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

    </section>

  </main>

  <!-- XLSX -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- FIREBASE CARREGADO DIRETO NO HTML -->

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDWHcTpgctAl5OBp9xLTKNyZxX3AstbD1Y",
      authDomain: "controleembalagens.firebaseapp.com",
      databaseURL: "https://controleembalagens-default-rtdb.firebaseio.com",
      projectId: "controleembalagens",
      storageBucket: "controleembalagens.firebasestorage.app",
      messagingSenderId: "47248064092",
      appId: "1:47248064092:web:1b13fa285cd6a154e3f099"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // expõe o db para o app.js
    window.db = db;
  </script>

  <!-- SEU SCRIPT PRINCIPAL -->
  <script src="app.js"></script>

</body>
</html>
